<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="referrer" content="no-referrer"/>
<title>Watch Together</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e0e10;
    --surface:   #18181b;
    --surface2:  #1f1f24;
    --border:    #2a2a30;
    --accent:    #ff4545;
    --accent2:   #ff7043;
    --text:      #e8e8ec;
    --muted:     #6b6b78;
    --online:    #3dd68c;
    --font-ui:   'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --radius:    8px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    overflow: hidden;
  }

  #app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    max-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    z-index: 10;
  }
  .logo {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { width: 12px; height: 12px; fill: #fff; }
  header h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
    flex-shrink: 0;
  }
  #url-form {
    display: flex;
    flex: 1;
    gap: 6px;
    margin-left: 8px;
  }
  #url-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }
  #url-input::placeholder { color: var(--muted); }
  #url-input:focus { border-color: var(--accent); }
  #url-input.error { border-color: #ff6b6b; animation: shake 0.25s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)}
  }
  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 6px 14px;
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 10px;
  }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); opacity: 1; }
  #sync-indicator {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--muted);
    flex-shrink: 0;
    margin-left: 4px;
    font-family: var(--font-mono);
  }
  #sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  #sync-dot.live { background: var(--online); box-shadow: 0 0 0 2px rgba(61,214,140,0.2); }
  #sync-dot.syncing { background: #f0c040; }

  main {
    display: grid;
    grid-template-columns: 1fr 200px;
    overflow: hidden;
  }

  #player-area {
    display: flex;
    flex-direction: column;
    background: #000;
    position: relative;
    overflow: hidden;
  }
  #player-wrap {
    flex: 1;
    position: relative;
    background: #000;
  }
  #yt-player-container {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  #yt-player, #yt-player iframe {
    width: 100%; height: 100%;
    position: absolute; inset: 0;
  }
  #idle-screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    background: var(--bg);
    color: var(--muted);
    z-index: 1;
  }
  #idle-screen.hidden { display: none; }
  #idle-screen svg { width: 48px; height: 48px; opacity: 0.25; }
  #idle-screen p { font-size: 13px; }
  #idle-screen span { font-family: var(--font-mono); font-size: 11px; color: var(--muted); opacity: 0.7; }

  .volume-container {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    padding-left: 12px;
    border-left: 1px solid var(--border);
  }

  #mute-btn {
   background: transparent;
   padding: 4px 8px;
   font-size: 1.1rem;
  }

  #mute-btn:hover {
   background: var(--surface2);
  }

  #volume-slider {
   width: 80px;
    cursor: pointer;
    accent-color: var(--accent);
  }
  #controls {
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 8px 12px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.2s;
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 2;
  }
  #player-area:hover #controls { opacity: 1; }
  #progress-wrap {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  #progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s linear;
  }
  .ctrl-btn {
    background: none; border: none;
    color: rgba(255,255,255,0.8);
    cursor: pointer; padding: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s;
  }
  .ctrl-btn:hover { color: #fff; }
  .ctrl-btn svg { width: 16px; height: 16px; fill: currentColor; }
  #time-display {
    font-family: var(--font-mono);
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    white-space: nowrap;
  }
  #host-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--accent);
    color: #fff;
    padding: 1px 6px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }

  #sidebar {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stab {
    flex: 1; padding: 8px 4px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.04em;
  }
  .stab.active { color: var(--text); border-color: var(--accent); }
  .tab-pane { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .tab-pane.active { display: flex; }

  #viewers-list {
    flex: 1; overflow-y: auto;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .viewer-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 12px;
    font-size: 12px;
  }
  .avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 500;
    flex-shrink: 0;
    position: relative;
  }
  .avatar::after {
    content: '';
    position: absolute; bottom: 0; right: 0;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--online);
    border: 1.5px solid var(--surface);
  }
  .viewer-name { color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .viewer-pos { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
  .host-tag {
    font-size: 9px;
    background: rgba(255,69,69,0.15);
    color: var(--accent);
    padding: 1px 4px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }

  #queue-list {
    flex: 1; overflow-y: auto;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .queue-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.1s;
    border-radius: 4px;
    margin: 0 4px;
  }
  .queue-item:hover { background: var(--surface2); }
  .queue-item.playing { background: rgba(255,69,69,0.1); }
  .queue-thumb {
    width: 48px; height: 32px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .queue-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .queue-meta { flex: 1; min-width: 0; }
  .queue-title { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-added { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .queue-remove {
    background: none; border: none; color: var(--muted);
    cursor: pointer; opacity: 0; padding: 2px;
    font-size: 14px; line-height: 1;
    transition: opacity 0.1s, color 0.1s;
  }
  .queue-item:hover .queue-remove { opacity: 1; }
  .queue-remove:hover { color: var(--accent); }
  .queue-empty {
    padding: 24px 12px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.6;
  }

  footer {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
  }
  #status-text { flex: 1; }
  #viewer-count { color: var(--text); }

  #toast {
    position: fixed; bottom: 40px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #not-ready {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; z-index: 200;
  }
  #not-ready.hidden { display: none; }
  #not-ready p { font-size: 12px; color: var(--muted); }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Chat ── */
  #chat-messages {
    flex: 1; overflow-y: auto;
    padding: 8px 0;
    display: flex; flex-direction: column; gap: 2px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .chat-msg {
    padding: 3px 12px;
    font-size: 12px;
    line-height: 1.5;
  }
  .chat-msg-name {
    font-weight: 500;
    font-size: 11px;
    margin-right: 4px;
  }
  .chat-msg-text { color: var(--text); word-break: break-word; }
  .chat-msg-time {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--muted);
    margin-left: 4px;
    vertical-align: middle;
  }
  .chat-system {
    padding: 3px 12px;
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }
  #chat-form {
    display: flex; gap: 6px;
    padding: 8px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #chat-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 8px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 12px;
    outline: none;
    min-width: 0;
  }
  #chat-input:focus { border-color: var(--accent); }
  #chat-badge {
    background: var(--accent);
    color: #fff;
    font-size: 9px;
    padding: 0 4px;
    border-radius: 8px;
    font-family: var(--font-mono);
    vertical-align: middle;
  }

  @media (max-width: 600px) {
    main { grid-template-columns: 1fr !important; grid-template-rows: 1fr auto; }
    #sidebar { border-left: none; border-top: 1px solid var(--border); max-height: 180px; }
    header h1 { display: none; }
  }
</style>
</head>
<body>

<div id="not-ready">
  <div class="spinner"></div>
  <p>Connecting to room…</p>
</div>

<div id="app">
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <h1>watch together</h1>

    <form id="url-form">
      <input id="url-input" type="text" placeholder="Paste YouTube URL or video ID…" autocomplete="off" spellcheck="false"/>
      <button class="btn" type="submit">Add</button>
      <button class="btn btn-ghost" type="button" id="watch-now-btn">Play now</button>
    </form>

    <div id="sync-indicator">
      <div id="sync-dot"></div>
      <span id="sync-label">waiting</span>
    </div>
  </header>

  <main>
    <div id="player-area">
      <div id="player-wrap">
        <div id="idle-screen">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.543 6.498C22 8.28 22 12 22 12s0 3.72-.457 5.502c-.254.985-.997 1.76-1.938 2.022C17.896 20 12 20 12 20s-5.895 0-7.605-.476c-.940-.262-1.684-1.037-1.938-2.022C2 15.72 2 12 2 12s0-3.72.457-5.502c.254-.985.997-1.76 1.938-2.022C6.105 4 12 4 12 4s5.896 0 7.605.476c.941.262 1.684 1.037 1.938 2.022zM10 15.5l6-3.5-6-3.5v7z"/></svg>
          <p>No video playing</p>
          <span>Paste a YouTube URL above to start</span>
        </div>
        <div id="yt-player-container" style="position:absolute;inset:0;width:100%;height:100%;">
          <div id="yt-player" style="width:100%;height:100%;"></div>
        </div>
        <div id="fallback-container" style="display:none; position:absolute; inset:0; z-index:1;"></div>
      </div>
      <div id="controls">
        <button class="ctrl-btn" id="play-pause-btn" title="Play/Pause">
          <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="volume-container">
          <button id="mute-btn" class="btn" title="Mute/Unmute">🔊</button>
          <input type="range" id="volume-slider" min="0" max="100" value="100" title="Volume">
        </div>
        <div id="progress-wrap">
          <div id="progress-bar"></div>
        </div>
        <span id="time-display">0:00 / 0:00</span>
        <span id="host-badge" style="display:none">HOST</span>
        <button class="ctrl-btn" id="fullscreen-btn" title="Fullscreen">
          <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
      </div>
    </div>

    <div id="sidebar">
      <div class="sidebar-tabs">
        <div class="stab active" data-tab="viewers">VIEWERS</div>
        <div class="stab" data-tab="queue">QUEUE</div>
        <div class="stab" data-tab="chat">CHAT <span id="chat-badge" style="display:none"></span></div>
      </div>

      <div class="tab-pane active" id="tab-viewers">
        <div id="viewers-list"></div>
      </div>

      <div class="tab-pane" id="tab-queue">
        <div id="queue-list"></div>
      </div>

      <div class="tab-pane" id="tab-chat">
        <div id="chat-messages"></div>
        <form id="chat-form">
          <input id="chat-input" type="text" placeholder="Say something…" autocomplete="off" maxlength="300"/>
          <button class="btn" type="submit" style="padding:6px 10px;flex-shrink:0">↑</button>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <span id="status-text">idle</span>
    <span id="viewer-count">0 watching</span>
  </footer>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/matrix-widget-api@1.17.0/dist/api.min.js"></script>
<script>
  var tag = document.createElement('script');
  window.__ytApiScriptFailed = false;
  tag.src = 'https://www.youtube.com/iframe_api';
  tag.onerror = function() {
    window.__ytApiScriptFailed = true;
    console.error('Could not load YouTube API script');
  };
  document.head.appendChild(tag);

<script>
'use strict';

// ─── Constants ───────────────────────────────────────────────────────────────
const EVENT_TYPE    = 'io.watch_together.sync';
const QUEUE_TYPE    = 'io.watch_together.queue';
const PRESENCE_TYPE = 'io.watch_together.presence';
const CHAT_TYPE     = 'io.watch_together.chat';
const DRIFT_LIMIT   = 2.0;
const POLL_MS       = 5000;
const DEBOUNCE_MS   = 800;
const PRESENCE_MS   = 12000;  // broadcast presence every 12s
const PRESENCE_TTL  = 35000;  // remove viewer if silent for 35s

// ─── Environment detection ────────────────────────────────────────────────────
// Detect if we're served over a real https origin (needed for title fetch CORS)
const SAFE_ORIGIN = /^https:/.test(window.location.protocol) ? window.location.origin : null;
console.log('[watch-together] safe origin:', SAFE_ORIGIN);

// ─── State ───────────────────────────────────────────────────────────────────
let widgetApi   = null;
let ytPlayer    = null;
let ytReady     = false;
let ytApiReady  = false;
let isHost      = false;
let myUserId    = null;
let myJoinedAt  = null;   // timestamp when we joined — used for host election
let currentId   = null;
let lastSentTs  = 0;
let ignoreNext  = false;
let driftTimer  = null;
let presenceTimer = null;
let queue       = [];
let viewers     = {};    // uid -> { name, position, joinedAt, lastSeen, isHost, color }
let chatMessages = [];
let unreadChat  = 0;
let chatOpen    = false;
let pendingPlay = null;
let playerInitTimer  = null;
let playerInitFailed = false;
let usingFallbackEmbed = false;
let ytErrorCount = 0;
let isLocalMuted = false;
let localVolume  = 100;

// ─── Helpers ─────────────────────────────────────────────────────────────────
const COLORS = ['#ff4545','#ff7043','#f0c040','#3dd68c','#4fc3f7','#ba68c8','#f06292'];
const colorFor = (uid) => COLORS[Math.abs([...uid].reduce((a,c)=>a+c.charCodeAt(0),0)) % COLORS.length];
const initials = (uid) => (uid.split(':')[0].replace('@','').slice(0,2)).toUpperCase();
const $ = (s) => document.querySelector(s);

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function toast(msg, ms=2500) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  s = Math.floor(s);
  const m = Math.floor(s/60), sec = s%60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function parseYouTubeId(raw) {
  raw = raw.trim();
  if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return raw;
  try {
    const url = new URL(raw.startsWith('http') ? raw : 'https://'+raw);
    if (url.hostname.includes('youtu.be')) {
      const id = url.pathname.slice(1).split('?')[0].split('/')[0];
      return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : null;
    }
    if (url.hostname.includes('youtube.com')) {
      const v = url.searchParams.get('v');
      if (v && /^[a-zA-Z0-9_-]{11}$/.test(v)) return v;
      const match = url.pathname.match(/\/(embed|shorts|live|v)\/([a-zA-Z0-9_-]{11})/);
      if (match) return match[2];
    }
  } catch {}
  return null;
}

function setSyncStatus(state) {
  const dot = $('#sync-dot'), label = $('#sync-label');
  dot.className = '';
  if (state === 'live')    { dot.classList.add('live');    label.textContent = 'synced'; }
  else if (state === 'sync') { dot.classList.add('syncing'); label.textContent = 'syncing'; }
  else                    { label.textContent = 'waiting'; }
}

function setStatus(msg) { $('#status-text').textContent = msg; }

// ─── Host election ────────────────────────────────────────────────────────────
// Host = viewer with the smallest joinedAt (first to arrive).
// Completely deterministic — no coordination messages needed.
function electHost() {
  const alive = Object.entries(viewers);
  if (alive.length === 0) { isHost = true; return; }
  let hostUid = alive[0][0];
  let oldest  = alive[0][1].joinedAt || Infinity;
  for (const [uid, v] of alive) {
    if ((v.joinedAt || Infinity) < oldest) { oldest = v.joinedAt; hostUid = uid; }
  }
  const wasHost = isHost;
  isHost = (hostUid === myUserId);
  if (isHost !== wasHost) {
    $('#host-badge').style.display = isHost ? '' : 'none';
    toast(isHost ? 'You are now the host' : `${viewers[hostUid]?.name || hostUid.split(':')[0].replace('@','')} is now host`);
    if (isHost) startDriftCheck(); // restart broadcaster
  }
}

// ─── Presence ─────────────────────────────────────────────────────────────────
function broadcastPresence() {
  if (!widgetApi) return;
  widgetApi.sendRoomEvent(PRESENCE_TYPE, {
    userId:   myUserId,
    name:     myUserId.split(':')[0].replace('@',''),
    joinedAt: myJoinedAt,
    position: (ytReady && ytPlayer && !usingFallbackEmbed) ? (ytPlayer.getCurrentTime() || 0) : null,
    videoId:  currentId,
    ts:       Date.now(),
  }).catch(() => {});
}

function startPresence() {
  broadcastPresence(); // announce immediately
  if (presenceTimer) clearInterval(presenceTimer);
  presenceTimer = setInterval(() => {
    broadcastPresence();
    pruneViewers();
  }, PRESENCE_MS);
}

function pruneViewers() {
  const now = Date.now();
  let changed = false;
  for (const [uid, v] of Object.entries(viewers)) {
    if (uid === myUserId) continue;
    if (now - (v.lastSeen || 0) > PRESENCE_TTL) {
      delete viewers[uid];
      changed = true;
    }
  }
  if (changed) { electHost(); renderViewers(); }
}

function applyPresence(data, sender) {
  const uid = sender || data.userId;
  if (!uid) return;
  const existing = viewers[uid];
  const isNew = !existing;
  viewers[uid] = {
    ...(existing || {}),
    name:     data.name || uid.split(':')[0].replace('@',''),
    joinedAt: data.joinedAt || existing?.joinedAt || data.ts || Date.now(),
    lastSeen: Date.now(),
    position: data.position ?? existing?.position,
    color:    colorFor(uid),
  };
  if (isNew) {
    addSystemMessage(`${viewers[uid].name} joined`);
  }
  electHost();
  renderViewers();
}

// ─── Viewers UI ───────────────────────────────────────────────────────────────
function renderViewers() {
  const list = $('#viewers-list');
  list.innerHTML = '';
  const entries = Object.entries(viewers);
  $('#viewer-count').textContent = `${entries.length} watching`;

  // Sort: host first, then by joinedAt
  entries.sort(([,a],[,b]) => (a.joinedAt||0) - (b.joinedAt||0));

  for (const [uid, v] of entries) {
    const isMe = uid === myUserId;
    const hostUid = entries[0]?.[0]; // first entry after sort = host
    const isThisHost = uid === hostUid;
    const row = document.createElement('div');
    row.className = 'viewer-row';
    row.innerHTML = `
      <div class="avatar" style="background:${colorFor(uid)};color:#fff;border-color:${colorFor(uid)}40">
        ${esc(initials(uid))}
      </div>
      <span class="viewer-name">${esc(v.name || uid.split(':')[0].replace('@',''))}${isMe?' (you)':''}</span>
      ${isThisHost ? '<span class="host-tag">HOST</span>' : ''}
      ${v.position != null ? `<span class="viewer-pos">${fmtTime(v.position)}</span>` : ''}
    `;
    list.appendChild(row);
  }
}

// ─── Chat ─────────────────────────────────────────────────────────────────────
function broadcastChat(text) {
  if (!widgetApi || !text.trim()) return;
  widgetApi.sendRoomEvent(CHAT_TYPE, {
    userId: myUserId,
    name:   myUserId.split(':')[0].replace('@',''),
    text:   text.trim().slice(0, 300),
    ts:     Date.now(),
  }).catch(() => {});
}

function applyChat(data, sender) {
  const uid  = sender || data.userId || 'unknown';
  const name = data.name || uid.split(':')[0].replace('@','');
  const msg  = { uid, name, text: data.text || '', ts: data.ts || Date.now(), isMe: uid === myUserId };
  chatMessages.push(msg);
  if (chatMessages.length > 200) chatMessages.shift();
  renderChatMessage(msg);

  if (!chatOpen) {
    unreadChat++;
    const badge = $('#chat-badge');
    badge.textContent = unreadChat > 9 ? '9+' : String(unreadChat);
    badge.style.display = '';
  }
}

function renderChatMessage(msg) {
  const el = document.createElement('div');
  el.className = 'chat-msg';
  const d = new Date(msg.ts);
  const time = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
  el.innerHTML = `<span class="chat-msg-name" style="color:${colorFor(msg.uid)}">${esc(msg.name)}</span><span class="chat-msg-text">${esc(msg.text)}</span><span class="chat-msg-time">${time}</span>`;
  const msgs = $('#chat-messages');
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function addSystemMessage(text) {
  const el = document.createElement('div');
  el.className = 'chat-system';
  el.textContent = text;
  const msgs = $('#chat-messages');
  if (msgs) { msgs.appendChild(el); msgs.scrollTop = msgs.scrollHeight; }
}

// ─── Queue UI ────────────────────────────────────────────────────────────────
function renderQueue() {
  const list = $('#queue-list');
  list.innerHTML = '';

  if (queue.length === 0) {
    const empty = document.createElement('div');

        onerror="this.onerror=null;this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 48 32%22><rect fill=%22%231f1f24%22 width=%2248%22 height=%2232%22/><text x=%2224%22 y=%2220%22 fill=%22%236b6b78%22 font-size=%2210%22 text-anchor=%22middle%22>?</text></svg>'"/></div>
      <div class="queue-meta">

function broadcastQueue() {

// ─── YouTube Player ──────────────────────────────────────────────────────────

function showFallback() {
  const ytc = document.getElementById('yt-player-container');
  const fbc = document.getElementById('fallback-container');
  if (ytc) ytc.style.display = 'none';
  if (fbc) fbc.style.display = '';
}

function showYtPlayer() {
  const ytc = document.getElementById('yt-player-container');
  const fbc = document.getElementById('fallback-container');
  if (ytc) ytc.style.display = '';
  if (fbc) { fbc.style.display = 'none'; fbc.innerHTML = ''; }
}

window.onYouTubeIframeAPIReady = function() {
  console.log('[watch-together] YT IFrame API ready');
  ytApiReady = true;
  createYouTubePlayer();
};

function createYouTubePlayer() {
  playerInitFailed = false;
  usingFallbackEmbed = false;
  showYtPlayer();

  // Destroy old player safely
  try {
    if (ytPlayer && typeof ytPlayer.destroy === 'function') ytPlayer.destroy();
  } catch(e) {}
  ytPlayer = null;
  ytReady = false;

  // Re-create the mount div fresh — YT.Player replaces it with an iframe
  const container = document.getElementById('yt-player-container');
  if (container) {
    container.innerHTML = '';
    const div = document.createElement('div');
    div.id = 'yt-player';
    container.appendChild(div);
  }

  // Get real pixel dimensions for YT constructor — passing "100%" causes Error 153
  // in sandboxed frames because YouTube can't measure a percentage-sized target.
  const wrap = document.getElementById('player-wrap');
  const w = wrap?.offsetWidth  || 640;
  const h = wrap?.offsetHeight || 360;

  try {
    ytPlayer = new YT.Player('yt-player', {
      width:  w,
      height: h,
      // nocookie + no origin = most permissive for sandboxed iframe contexts
      host: 'https://www.youtube-nocookie.com',
      playerVars: {
        autoplay:        0,
        controls:        0,
        rel:             0,
        modestbranding:  1,
        iv_load_policy:  3,
        playsinline:     1,
        enablejsapi:     1,
        // Do NOT pass origin — in vector://vector or null-origin contexts
        // a mismatched origin breaks the postMessage bridge entirely.
      },
      events: {
        onReady:       onYTReady,
        onStateChange: onYTStateChange,
        onError:       onYTError,
      }
    });
  } catch(e) {
    console.error('[watch-together] YT.Player constructor threw:', e);
    playerInitFailed = true;
    handlePlayerInitFailed();
    return;
  }

  // After iframe is injected, override its size to fill the container via CSS
  setTimeout(() => {
    const iframe = document.querySelector('#yt-player-container iframe');
    if (iframe) {
      iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:0;';
      iframe.setAttribute('referrerpolicy', 'no-referrer');
      iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen');
    }
  }, 400);

  if (playerInitTimer) clearTimeout(playerInitTimer);
  playerInitTimer = setTimeout(() => {
    if (ytReady) return;
    console.warn('[watch-together] YT player did not become ready — using fallback');
    playerInitFailed = true;
    handlePlayerInitFailed();
  }, 8000);
}

function handlePlayerInitFailed() {
  setStatus('YT API unavailable — using fallback player');
  toast('YouTube API could not init. Using fallback embed with native controls.', 4000);
  if (pendingPlay?.videoId) {
    const { videoId, seek } = pendingPlay;
    pendingPlay = null;
    playWithFallbackEmbed(videoId, seek || 0);
  }
}

function onYTReady() {
  ytReady = true;
  playerInitFailed = false;
  ytErrorCount = 0;
  if (playerInitTimer) clearTimeout(playerInitTimer);

  console.log('[watch-together] YT Player ready');

  // Patch iframe attributes now that it's definitely in the DOM
  const iframe = document.querySelector('#yt-player-container iframe');
  if (iframe) {
    iframe.setAttribute('referrerpolicy', 'no-referrer');
    iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen');
  }

  startDriftCheck();
  try {
    ytPlayer.setVolume(localVolume);
    if (isLocalMuted) ytPlayer.mute();
  } catch {}

  if (pendingPlay?.videoId) {
    const { videoId, seek } = pendingPlay;
    pendingPlay = null;
    playVideo(videoId, seek);
  }

  setStatus('player ready · paste a URL to watch together');
  toast('Player connected!', 1500);
}

function onYTError(e) {
  const code = e.data;
  console.error('[watch-together] YouTube player error:', code);
  ytErrorCount++;

  const messages = {
    2:   'Invalid video ID',
    5:   'HTML5 player error',
    100: 'Video not found or private',
    101: 'Embed not allowed by owner',
    150: 'Embed not allowed by owner',
    153: 'Player config error — using fallback',
  };
  const msg = messages[code] || `Player error (code ${code})`;
  toast(msg, 4000);
  setStatus('error: ' + msg);

  // Config / policy errors → switch to fallback embed
  if (code === 153 || code === 2 || code === 5) {
    playerInitFailed = true;
    if (currentId) playWithFallbackEmbed(currentId, 0);
    return;
  }

  // Embed blocked for this video → fallback for it
  if (code === 101 || code === 150) {
    if (currentId) {
      toast('Embed blocked — trying fallback player…', 2500);
      playWithFallbackEmbed(currentId, 0);
    } else {
      setTimeout(() => playNextInQueue(), 1500);
    }
    return;
  }

  // Not found → skip
  if (code === 100) {
    setTimeout(() => playNextInQueue(), 1500);
    return;
  }
}

function onYTStateChange(e) {
  const S = YT.PlayerState;
  updateControlsUI();

  if (!isHost) return;
  if (ignoreNext) { ignoreNext = false; return; }

  const now = Date.now();
  if (now - lastSentTs < DEBOUNCE_MS) return;
  lastSentTs = now;

  if (e.data === S.PLAYING || e.data === S.PAUSED || e.data === S.ENDED) {
    const playing = e.data === S.PLAYING;
    broadcastSync({ state: playing ? 'playing' : 'paused' });
    setSyncStatus('live');

    if (e.data === S.ENDED) {
      playNextInQueue();
    }
  }
}

function updateControlsUI() {
  if (usingFallbackEmbed) return;
  if (!ytPlayer || !ytReady) return;
  try {
    const S = YT.PlayerState;
    const state = ytPlayer.getPlayerState();
    const playing = state === S.PLAYING;

    $('#play-icon').setAttribute('d', playing
      ? 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'
      : 'M8 5v14l11-7z'
    );

    const dur = ytPlayer.getDuration() || 0;
    const pos = ytPlayer.getCurrentTime() || 0;
    if (dur > 0) {
      $('#progress-bar').style.width = (pos/dur*100)+'%';
      $('#time-display').textContent = `${fmtTime(pos)} / ${fmtTime(dur)}`;
    }

    if (viewers[myUserId]) {
      viewers[myUserId].position = pos;
      renderViewers();
    }
  } catch(err) {}
}

function playVideo(videoId, seek) {
  // Clean up fallback if active
  if (usingFallbackEmbed) {
    const fbc = document.getElementById('fallback-container');
    if (fbc) { fbc.innerHTML = ''; fbc.style.display = 'none'; }
    usingFallbackEmbed = false;
  }

  if (!ytReady) {
    if (playerInitFailed) {
      playWithFallbackEmbed(videoId, seek || 0);
      return;
    }
    pendingPlay = { videoId, seek: seek || 0 };
    toast(ytApiReady ? 'Player is loading, will start shortly…' : 'YouTube API still loading…');
    return;
  }

  currentId = videoId;
  $('#idle-screen').classList.add('hidden');
  showYtPlayer();
  ignoreNext = true;

  try {
    ytPlayer.loadVideoById({ videoId, startSeconds: seek || 0 });
  } catch (e) {
    console.error('[watch-together] loadVideoById failed:', e);
    playWithFallbackEmbed(videoId, seek || 0);
    return;
  }

  setStatus(`playing: ${videoId}`);
  renderQueue();
}

function playWithFallbackEmbed(videoId, seek) {
  const fbc = document.getElementById('fallback-container');
  if (!fbc) return;

  showFallback();

  const start = Math.max(0, Math.floor(seek || 0));
  const watchUrl = `https://www.youtube.com/watch?v=${encodeURIComponent(videoId)}`;
  const hosts = ['https://www.youtube-nocookie.com', 'https://www.youtube.com'];
  let hostIndex = 0;

  const renderWithHost = () => {
    const host = hosts[Math.min(hostIndex, hosts.length - 1)];
    // FIX: In fallback mode do NOT send origin at all — let YouTube figure it out.
    // Also enable controls=1 so user can interact, and autoplay=1.
    const src = `${host}/embed/${encodeURIComponent(videoId)}?autoplay=1&playsinline=1&rel=0&modestbranding=1&controls=1&start=${start}`;
    fbc.innerHTML = `
      <iframe
        src="${src}"
        title="YouTube player (fallback)"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
        allowfullscreen
        referrerpolicy="no-referrer"
        style="width:100%;height:100%;border:0;position:absolute;inset:0"
      ></iframe>
      <a
        href="${watchUrl}"
        target="_blank"
        rel="noopener noreferrer"
        style="position:absolute;right:10px;bottom:50px;z-index:5;background:rgba(0,0,0,.65);color:#fff;padding:6px 10px;border-radius:6px;font-size:12px;text-decoration:none;border:1px solid rgba(255,255,255,.2)"
      >Open on YouTube ↗</a>
    `;
    const iframe = fbc.querySelector('iframe');
    iframe?.addEventListener('error', () => {
      if (hostIndex < hosts.length - 1) {
        hostIndex += 1;
        renderWithHost();
      } else {
        setStatus(`fallback failed · open on YouTube: ${videoId}`);
      }
    });
  };

  renderWithHost();
  usingFallbackEmbed = true;
  currentId = videoId;
  $('#idle-screen').classList.add('hidden');
  setStatus(`playing (fallback): ${videoId}`);
  renderQueue();
}

function playNextInQueue() {
  const idx = queue.findIndex(q => q.videoId === currentId);
  if (idx >= 0 && idx < queue.length - 1) {
    const next = queue[idx + 1];
    playVideo(next.videoId);
    if (isHost) broadcastSync({ state: 'playing', videoId: next.videoId, position: 0 });
  } else {
    toast('Queue ended');
    setStatus('queue ended');
  }
}

// ─── Sync ────────────────────────────────────────────────────────────────────
function broadcastSync(extra = {}) {
  if (!widgetApi) return;
  const payload = {
    videoId: currentId,
    position: (ytReady && ytPlayer && !usingFallbackEmbed) ? (ytPlayer.getCurrentTime() || 0) : 0,
    state: 'playing',
    ts: Date.now(),
    ...extra,
  };
  widgetApi.sendRoomEvent(EVENT_TYPE, payload).catch((e) => console.warn('sync failed:', e));
}

function applySync(content) {
  const { videoId, position, state, ts } = content || {};
  if (typeof position !== 'number' || isNaN(position) || position < 0 || position > 86400) return;
  if (typeof ts !== 'number' || isNaN(ts)) return;
  if (!['playing', 'paused'].includes(state)) return;
  if (!videoId || typeof videoId !== 'string') return;
  if (!/^[a-zA-Z0-9_-]{11}$/.test(videoId)) return;

  // In fallback mode we can only switch videos
  if (usingFallbackEmbed) {
    if (videoId !== currentId) {
      playWithFallbackEmbed(videoId, position);
    }
    setSyncStatus('live');
    return;
  }

  if (!ytReady) return;

  const adjusted = position + Math.min((Date.now() - ts) / 1000, 5);
  const S = YT.PlayerState;

  setSyncStatus('sync');

  if (videoId && videoId !== currentId) {
    playVideo(videoId, adjusted);
    if (state === 'playing') { ignoreNext = true; ytPlayer.playVideo(); }
    setSyncStatus('live');
    return;
  }

  if (!videoId) { setSyncStatus('live'); return; }

  const curPos = ytPlayer.getCurrentTime() || 0;
  const drift = Math.abs(curPos - adjusted);

  if (drift > DRIFT_LIMIT) {
    ignoreNext = true;
    ytPlayer.seekTo(adjusted, true);
  }

  ignoreNext = true;
  if (state === 'playing') ytPlayer.playVideo();
  else ytPlayer.pauseVideo();

  setSyncStatus('live');
}

function startDriftCheck() {
  if (driftTimer) clearInterval(driftTimer);
  driftTimer = setInterval(() => {
    if (!isHost || !ytReady || !currentId || usingFallbackEmbed) return;
    try {
      const s = ytPlayer.getPlayerState();
      if (s === YT.PlayerState.PLAYING) broadcastSync();
    } catch(e) {}
    updateControlsUI();
  }, POLL_MS);

  setInterval(updateControlsUI, 500);
}

// ─── Matrix Widget API init ──────────────────────────────────────────────────
async function initWidget() {
  try {
    if (!window.matrixWidgetApi || !window.matrixWidgetApi.WidgetApi) {
      console.warn('Matrix Widget API unavailable, running standalone');
      myUserId = '@standalone:local';
      widgetApi = null;
      onReady();
      return;
    }

    const WidgetApi = matrixWidgetApi.WidgetApi;
    const WidgetApiToWidgetAction = matrixWidgetApi.WidgetApiToWidgetAction;

    const params = new URLSearchParams(location.search);
    const widgetId = params.get('widgetId') || params.get('widget_id') || 'standalone';

    widgetApi = new WidgetApi(widgetId);

    // Register capabilities BEFORE calling start()
    widgetApi.requestCapabilityToSendEvent(EVENT_TYPE);
    widgetApi.requestCapabilityToReceiveEvent(EVENT_TYPE);
    widgetApi.requestCapabilityToSendEvent(QUEUE_TYPE);
    widgetApi.requestCapabilityToReceiveEvent(QUEUE_TYPE);
    widgetApi.requestCapabilityToSendEvent(PRESENCE_TYPE);
    widgetApi.requestCapabilityToReceiveEvent(PRESENCE_TYPE);
    widgetApi.requestCapabilityToSendEvent(CHAT_TYPE);
    widgetApi.requestCapabilityToReceiveEvent(CHAT_TYPE);

    // Listen for incoming room events (sync + queue + presence + chat)
    widgetApi.on(`action:${WidgetApiToWidgetAction.SendEvent}`, (ev) => {
      const { type, content, sender } = ev.detail?.data || {};
      ev.preventDefault();
      // Must ACK the action or Element will retry it
      widgetApi.transport.reply(ev.detail, {});

      if (type === EVENT_TYPE) {
        if (sender) {
          viewers[sender] = viewers[sender] || {};
          viewers[sender].position = content.position;
          viewers[sender].name = sender.split(':')[0].replace('@','');
          viewers[sender].lastSeen = Date.now();
          renderViewers();
        }
        if (sender === myUserId) return; // ignore our own echo
        applySync(content);
      }

      if (type === QUEUE_TYPE && sender !== myUserId) {
        if (content.queue && Array.isArray(content.queue)) {
          queue = content.queue;
          renderQueue();
        }
      }

      if (type === PRESENCE_TYPE) {
        if (sender !== myUserId) applyPresence(content, sender);
      }

      if (type === CHAT_TYPE) {
        if (sender !== myUserId) applyChat(content, sender);
      }
    });

    // start() resolves once Element has approved capabilities
    widgetApi.start();

    // Try to get our user ID from the OIDC token
    try {
      const info = await widgetApi.requestOpenIDConnectToken();
      myUserId = info?.matrix_server_name ? `@me:${info.matrix_server_name}` : '@me:local';
    } catch {
      myUserId = '@me:local';
    }

    setSyncStatus('live');
    onReady();

  } catch (err) {
    console.warn('Widget API error, running standalone:', err);
    myUserId = '@standalone:local';
    widgetApi = null;
    onReady();
  }
}

function onReady() {
  $('#not-ready').classList.add('hidden');

  myJoinedAt = Date.now();

  viewers[myUserId] = {
    name:     myUserId.split(':')[0].replace('@',''),
    joinedAt: myJoinedAt,
    lastSeen: myJoinedAt,
    color:    colorFor(myUserId),
  };

  // Start as host; electHost will hand off if someone else has older joinedAt
  isHost = true;
  $('#host-badge').style.display = '';
  setStatus('ready · paste a URL to watch together');

  renderViewers();
  renderQueue();

  if (widgetApi) {
    setSyncStatus('live');
    startPresence();
    addSystemMessage('Connected to room.');
  } else {
    setSyncStatus('waiting');
    toast('Running standalone (no Matrix room connected)');
    addSystemMessage('Standalone mode — no room connected.');
  }
}

// ─── UI Events ───────────────────────────────────────────────────────────────

$('#url-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const raw = $('#url-input').value;
  const vid = parseYouTubeId(raw);
  if (!vid) {
    $('#url-input').classList.add('error');
    setTimeout(() => $('#url-input').classList.remove('error'), 600);
    toast('Not a valid YouTube URL or video ID');
    return;
  }
  const exists = queue.some(q => q.videoId === vid);
  if (!exists) {
    queue.push({ videoId: vid, title: vid, addedBy: myUserId?.split(':')[0].replace('@','') || 'you' });
    broadcastQueue();
    renderQueue();
    toast('Added to queue');
    fetchTitle(vid);

    if (!currentId) {
      playVideo(vid);
      if (isHost) broadcastSync({ state: 'playing', videoId: vid, position: 0 });
    }
  } else {
    toast('Already in queue');
  }
  $('#url-input').value = '';
  activateTab('queue');
});

$('#watch-now-btn').addEventListener('click', () => {
  const raw = $('#url-input').value;
  const vid = parseYouTubeId(raw);
  if (!vid) {
    $('#url-input').classList.add('error');
    setTimeout(() => $('#url-input').classList.remove('error'), 600);
    toast('Not a valid YouTube URL or video ID');
    return;
  }
  $('#url-input').value = '';

  if (!queue.some(q => q.videoId === vid)) {
    queue.push({ videoId: vid, title: vid, addedBy: myUserId?.split(':')[0].replace('@','') || 'you' });
    broadcastQueue();
    fetchTitle(vid);
  }

  ytErrorCount = 0;
  playVideo(vid);
  renderQueue();
  if (isHost) broadcastSync({ state: 'playing', videoId: vid, position: 0 });
});

$('#play-pause-btn').addEventListener('click', () => {
  if (usingFallbackEmbed) {
    toast('Use the YouTube controls in fallback mode');
    return;
  }
  if (!ytPlayer || !ytReady || !currentId) return;
  const S = YT.PlayerState;
  const state = ytPlayer.getPlayerState();
  if (state === S.PLAYING) {
    ytPlayer.pauseVideo();
    if (isHost) broadcastSync({ state: 'paused' });
  } else {
    ytPlayer.playVideo();
    if (isHost) broadcastSync({ state: 'playing' });
  }
});

$('#progress-wrap').addEventListener('click', (e) => {
  if (usingFallbackEmbed) return;
  if (!ytReady || !currentId) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const frac = (e.clientX - rect.left) / rect.width;
  const dur = ytPlayer.getDuration() || 0;
  const pos = frac * dur;
  ytPlayer.seekTo(pos, true);
  if (isHost) broadcastSync({ state: 'playing', position: pos });
});

$('#fullscreen-btn').addEventListener('click', () => {
  const el = $('#player-area');
  if (document.fullscreenElement) document.exitFullscreen();
  else el.requestFullscreen().catch(()=>{});
});

document.querySelectorAll('.stab').forEach(tab => {
  tab.addEventListener('click', () => activateTab(tab.dataset.tab));
});

function activateTab(name) {
  document.querySelectorAll('.stab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === `tab-${name}`));
  if (name === 'chat') {
    chatOpen = true;
    unreadChat = 0;
    $('#chat-badge').style.display = 'none';
    const msgs = $('#chat-messages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
    setTimeout(() => $('#chat-input')?.focus(), 50);
  } else {
    chatOpen = false;
  }
}

// ─── Chat submit ──────────────────────────────────────────────────────────────
$('#chat-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const input = $('#chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  // Show own message immediately
  applyChat({ userId: myUserId, name: myUserId.split(':')[0].replace('@',''), text, ts: Date.now() }, myUserId);
  broadcastChat(text);
});

// ─── Local Volume Controls ───────────────────────────────────────────────────
const muteBtn = document.getElementById('mute-btn');
const volumeSlider = document.getElementById('volume-slider');

function updateVolumeIcon() {
  if (isLocalMuted || localVolume === 0) {
    muteBtn.textContent = '🔇';
  } else if (localVolume < 50) {
    muteBtn.textContent = '🔉';
  } else {
    muteBtn.textContent = '🔊';
  }
}

muteBtn.addEventListener('click', () => {
  isLocalMuted = !isLocalMuted;

  if (ytPlayer && typeof ytPlayer.mute === 'function' && !usingFallbackEmbed) {
    isLocalMuted ? ytPlayer.mute() : ytPlayer.unMute();
    if (!isLocalMuted && localVolume === 0) {
      localVolume = 20;
      volumeSlider.value = localVolume;
      ytPlayer.setVolume(localVolume);
    }
  }

  updateVolumeIcon();
});

volumeSlider.addEventListener('input', (e) => {
  localVolume = parseInt(e.target.value, 10);

  if (ytPlayer && typeof ytPlayer.setVolume === 'function' && !usingFallbackEmbed) {
    ytPlayer.setVolume(localVolume);
    if (isLocalMuted && localVolume > 0) {
      isLocalMuted = false;
      ytPlayer.unMute();
    }
    if (!isLocalMuted && localVolume === 0) {
      isLocalMuted = true;
      ytPlayer.mute();
    }
  }

  updateVolumeIcon();
});

// ─── Title fetch ─────────────────────────────────────────────────────────────
async function fetchTitle(videoId) {
  // FIX: Only use noembed.com — youtube.com/oembed is blocked by CORB
  // in cross-origin widget contexts.
  try {
    const res = await fetch(`https://noembed.com/embed?url=https://youtube.com/watch?v=${encodeURIComponent(videoId)}`);
    if (!res.ok) return;
    const data = await res.json();
    if (data.title) {
      const item = queue.find(q => q.videoId === videoId);
      if (item) {
        item.title = data.title;
        renderQueue();
        broadcastQueue();
      }
    }
  } catch (e) {
    console.warn('[watch-together] Title fetch failed (CORB or network):', e);
  }
}

// ─── Boot ────────────────────────────────────────────────────────────────────
initWidget();

setTimeout(() => {
  if (window.__ytApiScriptFailed) {
    toast('Could not load YouTube API script — fallback mode available', 5000);
    setStatus('YouTube API script failed — fallback available');
    playerInitFailed = true;
    return;
  }
  if (!ytApiReady) {
    toast('YouTube API did not load — fallback mode available', 5000);
    setStatus('YouTube API failed — fallback available');
    playerInitFailed = true;
  }
}, 7000);

window.addEventListener('error', (ev) => {
  if (!ev?.message) return;
  console.error('Unhandled error:', ev.message, ev.error);
  if (!ytReady) setStatus('error: ' + ev.message);
});

window.addEventListener('unhandledrejection', (ev) => {
  const msg = ev?.reason?.message || String(ev?.reason || 'promise rejection');
  console.error('Unhandled rejection:', ev.reason);
  if (!ytReady) setStatus('error: ' + msg);
});
</script>
