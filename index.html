<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Content-Security-Policy" content="
  default-src 'none';
  script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.youtube.com https://s.ytimg.com;
  frame-src https://www.youtube-nocookie.com https://www.youtube.com;
  connect-src https://noembed.com https://www.youtube.com;
  img-src 'self' https://img.youtube.com data:;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src https://fonts.gstatic.com;
">
<meta name="referrer" content="origin"/>
<title>Watch Together</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e0e10;
    --surface:   #18181b;
    --surface2:  #1f1f24;
    --border:    #2a2a30;
    --accent:    #ff4545;
    --accent2:   #ff7043;
    --text:      #e8e8ec;
    --muted:     #6b6b78;
    --online:    #3dd68c;
    --font-ui:   'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --radius:    8px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    overflow: hidden;
  }

  #app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    max-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    z-index: 10;
  }
  .logo {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { width: 12px; height: 12px; fill: #fff; }
  header h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
    flex-shrink: 0;
  }
  #url-form {
    display: flex;
    flex: 1;
    gap: 6px;
    margin-left: 8px;
  }
  #url-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }
  #url-input::placeholder { color: var(--muted); }
  #url-input:focus { border-color: var(--accent); }
  #url-input.error { border-color: #ff6b6b; animation: shake 0.25s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)}
  }
  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 6px 14px;
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 10px;
  }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); opacity: 1; }
  #sync-indicator {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--muted);
    flex-shrink: 0;
    margin-left: 4px;
    font-family: var(--font-mono);
  }
  #sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  #sync-dot.live { background: var(--online); box-shadow: 0 0 0 2px rgba(61,214,140,0.2); }
  #sync-dot.syncing { background: #f0c040; }

  main {
    display: grid;
    grid-template-columns: 1fr 200px;
    overflow: hidden;
  }

  #player-area {
    display: flex;
    flex-direction: column;
    background: #000;
    position: relative;
    overflow: hidden;
  }
  #player-wrap {
    flex: 1;
    position: relative;
    background: #000;
  }
  #player-wrap iframe, #player-wrap > div {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  #idle-screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    background: var(--bg);
    color: var(--muted);
    z-index: 1;
  }
  #idle-screen.hidden { display: none; }
  #idle-screen svg { width: 48px; height: 48px; opacity: 0.25; }
  #idle-screen p { font-size: 13px; }
  #idle-screen span { font-family: var(--font-mono); font-size: 11px; color: var(--muted); opacity: 0.7; }

  /* Volume Controls */
  .volume-container {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto; /* Pushes the volume controls to the right side of the bar */
    padding-left: 12px;
    border-left: 1px solid var(--border);
  } 

  #mute-btn {
   background: transparent;
   padding: 4px 8px;
   font-size: 1.1rem;
  }

  #mute-btn:hover {
   background: var(--surface2);
  }

  #volume-slider {
   width: 80px;
    cursor: pointer;
    accent-color: var(--accent); /* Uses your existing red accent color */
  }
  #controls {
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 8px 12px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.2s;
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 2;
  }
  #player-area:hover #controls { opacity: 1; }
  #progress-wrap {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  #progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s linear;
  }
  .ctrl-btn {
    background: none; border: none;
    color: rgba(255,255,255,0.8);
    cursor: pointer; padding: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s;
  }
  .ctrl-btn:hover { color: #fff; }
  .ctrl-btn svg { width: 16px; height: 16px; fill: currentColor; }
  #time-display {
    font-family: var(--font-mono);
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    white-space: nowrap;
  }
  #host-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--accent);
    color: #fff;
    padding: 1px 6px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }

  #sidebar {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stab {
    flex: 1; padding: 8px 4px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.04em;
  }
  .stab.active { color: var(--text); border-color: var(--accent); }
  .tab-pane { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .tab-pane.active { display: flex; }

  #viewers-list {
    flex: 1; overflow-y: auto;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .viewer-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 12px;
    font-size: 12px;
  }
  .avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 500;
    flex-shrink: 0;
    position: relative;
  }
  .avatar::after {
    content: '';
    position: absolute; bottom: 0; right: 0;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--online);
    border: 1.5px solid var(--surface);
  }
  .viewer-name { color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .viewer-pos { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
  .host-tag {
    font-size: 9px;
    background: rgba(255,69,69,0.15);
    color: var(--accent);
    padding: 1px 4px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }

  #queue-list {
    flex: 1; overflow-y: auto;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .queue-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.1s;
    border-radius: 4px;
    margin: 0 4px;
  }
  .queue-item:hover { background: var(--surface2); }
  .queue-item.playing { background: rgba(255,69,69,0.1); }
  .queue-thumb {
    width: 48px; height: 32px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .queue-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .queue-meta { flex: 1; min-width: 0; }
  .queue-title { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-added { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .queue-remove {
    background: none; border: none; color: var(--muted);
    cursor: pointer; opacity: 0; padding: 2px;
    font-size: 14px; line-height: 1;
    transition: opacity 0.1s, color 0.1s;
  }
  .queue-item:hover .queue-remove { opacity: 1; }
  .queue-remove:hover { color: var(--accent); }
  .queue-empty {
    padding: 24px 12px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.6;
  }

  footer {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
  }
  #status-text { flex: 1; }
  #viewer-count { color: var(--text); }

  #toast {
    position: fixed; bottom: 40px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #not-ready {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; z-index: 200;
  }
  #not-ready.hidden { display: none; }
  #not-ready p { font-size: 12px; color: var(--muted); }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    main { grid-template-columns: 1fr !important; grid-template-rows: 1fr auto; }
    #sidebar { border-left: none; border-top: 1px solid var(--border); max-height: 180px; }
    header h1 { display: none; }
  }
</style>
</head>
<body>

<div id="not-ready">
  <div class="spinner"></div>
  <p>Connecting to room…</p>
</div>

<div id="app">
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <h1>watch together</h1>

    <form id="url-form">
      <input id="url-input" type="text" placeholder="Paste YouTube URL or video ID…" autocomplete="off" spellcheck="false"/>
      <button class="btn" type="submit">Add</button>
      <button class="btn btn-ghost" type="button" id="watch-now-btn">Play now</button>
    </form>

    <div id="sync-indicator">
      <div id="sync-dot"></div>
      <span id="sync-label">waiting</span>
    </div>
  </header>

  <main>
    <div id="player-area">
      <div id="player-wrap">
        <div id="idle-screen">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.543 6.498C22 8.28 22 12 22 12s0 3.72-.457 5.502c-.254.985-.997 1.76-1.938 2.022C17.896 20 12 20 12 20s-5.895 0-7.605-.476c-.940-.262-1.684-1.037-1.938-2.022C2 15.72 2 12 2 12s0-3.72.457-5.502c.254-.985.997-1.76 1.938-2.022C6.105 4 12 4 12 4s5.896 0 7.605.476c.941.262 1.684 1.037 1.938 2.022zM10 15.5l6-3.5-6-3.5v7z"/></svg>
          <p>No video playing</p>
          <span>Paste a YouTube URL above to start</span>
        </div>
        <div id="yt-player"></div>
      </div>
      <div id="controls">
        <button class="ctrl-btn" id="play-pause-btn" title="Play/Pause">
          <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="volume-container">
          <button id="mute-btn" class="btn" title="Mute/Unmute">🔊</button>
          <input type="range" id="volume-slider" min="0" max="100" value="100" title="Volume">
        </div>
        <div id="progress-wrap">
          <div id="progress-bar"></div>
        </div>
        <span id="time-display">0:00 / 0:00</span>
        <span id="host-badge" style="display:none">HOST</span>
        <button class="ctrl-btn" id="fullscreen-btn" title="Fullscreen">
          <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
      </div>
    </div>

    <div id="sidebar">
      <div class="sidebar-tabs">
        <div class="stab active" data-tab="viewers">VIEWERS</div>
        <div class="stab" data-tab="queue">QUEUE</div>
      </div>

      <div class="tab-pane active" id="tab-viewers">
        <div id="viewers-list"></div>
      </div>

      <div class="tab-pane" id="tab-queue">
        <div id="queue-list"></div>
      </div>
    </div>
  </main>

  <footer>
    <span id="status-text">idle</span>
    <span id="viewer-count">0 watching</span>
  </footer>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/matrix-widget-api@1.9.0/dist/matrix-widget-api.js"></script>
<script>
  var tag = document.createElement('script');
  window.__ytApiScriptFailed = false;
  tag.src = 'https://www.youtube.com/iframe_api';
  tag.onerror = function() {
    window.__ytApiScriptFailed = true;
    console.error('Could not load YouTube API script');
  };
  document.head.appendChild(tag);
</script>

<script>
'use strict';

// ─── Constants ───────────────────────────────────────────────────────────────
const EVENT_TYPE  = 'io.watch_together.sync';
const QUEUE_TYPE  = 'io.watch_together.queue';
const DRIFT_LIMIT = 2.0;
const POLL_MS     = 5000;
const DEBOUNCE_MS = 800;

// ─── State ───────────────────────────────────────────────────────────────────
let widgetApi   = null;
let ytPlayer    = null;
let ytReady     = false;
let ytApiReady  = false;
let isHost      = false;
let myUserId    = null;
let currentId   = null;
let lastSentTs  = 0;
let ignoreNext  = false;
let driftTimer  = null;
let queue       = [];
let viewers     = {};
let pendingPlay = null;
let playerInitTimer = null;
let playerInitModeIndex = 0;
let playerInitFailed = false;
let usingFallbackEmbed = false;

// ─── Helpers ─────────────────────────────────────────────────────────────────
const COLORS = ['#ff4545','#ff7043','#f0c040','#3dd68c','#4fc3f7','#ba68c8','#f06292'];
const colorFor = (uid) => COLORS[Math.abs([...uid].reduce((a,c)=>a+c.charCodeAt(0),0)) % COLORS.length];
const initials = (uid) => (uid.split(':')[0].replace('@','').slice(0,2)).toUpperCase();
const $ = (s) => document.querySelector(s);

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function toast(msg, ms=2500) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  s = Math.floor(s);
  const m = Math.floor(s/60), sec = s%60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function parseYouTubeId(raw) {
  raw = raw.trim();
  if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return raw;
  try {
    const url = new URL(raw.startsWith('http') ? raw : 'https://'+raw);
    if (url.hostname.includes('youtu.be')) {
      const id = url.pathname.slice(1).split('?')[0].split('/')[0];
      return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : null;
    }
    if (url.hostname.includes('youtube.com')) {
      // ?v= parameter
      const v = url.searchParams.get('v');
      if (v && /^[a-zA-Z0-9_-]{11}$/.test(v)) return v;
      // /embed/ID, /shorts/ID, /live/ID
      const match = url.pathname.match(/\/(embed|shorts|live|v)\/([a-zA-Z0-9_-]{11})/);
      if (match) return match[2];
    }
  } catch {}
  return null;
}

function setSyncStatus(state) {
  const dot = $('#sync-dot'), label = $('#sync-label');
  dot.className = '';
  if (state === 'live')    { dot.classList.add('live');    label.textContent = 'synced'; }
  else if (state === 'sync') { dot.classList.add('syncing'); label.textContent = 'syncing'; }
  else                    { label.textContent = 'waiting'; }
}

function setStatus(msg) { $('#status-text').textContent = msg; }

// ─── Viewers UI ──────────────────────────────────────────────────────────────
function renderViewers() {
  const list = $('#viewers-list');
  list.innerHTML = '';
  const count = Object.keys(viewers).length;
  $('#viewer-count').textContent = `${count} watching`;

  Object.entries(viewers).forEach(([uid, v]) => {
    const isMe = uid === myUserId;
    const row = document.createElement('div');
    row.className = 'viewer-row';
    row.innerHTML = `
      <div class="avatar" style="background:${colorFor(uid)};color:#fff;border-color:${colorFor(uid)}">
        ${esc(initials(uid))}
      </div>
      <span class="viewer-name">${esc(v.name || uid.split(':')[0].replace('@',''))}${isMe?' (you)':''}</span>
      ${v.isHost ? '<span class="host-tag">HOST</span>' : ''}
      ${v.position != null ? `<span class="viewer-pos">${fmtTime(v.position)}</span>` : ''}
    `;
    list.appendChild(row);
  });
}

// ─── Queue UI ────────────────────────────────────────────────────────────────
// FIX 2: Completely rebuild queue-list every render — no detached-node bugs
function renderQueue() {
  const list = $('#queue-list');
  list.innerHTML = '';

  if (queue.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'queue-empty';
    empty.innerHTML = 'Queue is empty.<br/>Add videos above.';
    list.appendChild(empty);
    return;
  }

  queue.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'queue-item' + (item.videoId === currentId ? ' playing' : '');
    el.innerHTML = `
      <div class="queue-thumb"><img src="https://img.youtube.com/vi/${encodeURIComponent(item.videoId)}/mqdefault.jpg" loading="lazy" alt=""/></div>
      <div class="queue-meta">
        <div class="queue-title">${esc(item.title || item.videoId)}</div>
        <div class="queue-added">by ${esc(item.addedBy || 'someone')}</div>
      </div>
      <button class="queue-remove" title="Remove">✕</button>
    `;
    // Remove button
    el.querySelector('.queue-remove').addEventListener('click', (e) => {
      e.stopPropagation();
      queue.splice(i, 1);
      renderQueue();
      broadcastQueue();
    });
    // Click to play
    el.addEventListener('click', () => {
      playVideo(item.videoId);
      if (isHost) broadcastSync({ state: 'playing', videoId: item.videoId, position: 0 });
    });
    list.appendChild(el);
  });
}

function broadcastQueue() {
  if (!widgetApi) return;
  widgetApi.sendRoomEvent(QUEUE_TYPE, { queue }).catch((e) => console.warn('queue broadcast failed:', e));
}

// ─── YouTube Player ──────────────────────────────────────────────────────────
// FIX 3: Add origin + host + widget_referrer to fix Error 153
window.onYouTubeIframeAPIReady = function() {
  ytApiReady = true;
  createYouTubePlayer(0);
};

function createYouTubePlayer(modeIndex) {
  playerInitFailed = false;
  usingFallbackEmbed = false;
  // Only send origin on http(s). file:// yields "null" which can break local embeds.
  const isHttpOrigin = /^https?:$/.test(window.location.protocol);
  const pageOrigin = isHttpOrigin ? window.location.origin : null;
  const modes = [
    { host: 'https://www.youtube-nocookie.com', includeOrigin: true, includeWidgetReferrer: true },
    { host: 'https://www.youtube.com',          includeOrigin: true, includeWidgetReferrer: true },
    { host: 'https://www.youtube.com',          includeOrigin: true, includeWidgetReferrer: false },
    { host: 'https://www.youtube.com',          includeOrigin: false, includeWidgetReferrer: false },
  ];
  const mode = modes[Math.min(modeIndex, modes.length - 1)];
  playerInitModeIndex = Math.min(modeIndex, modes.length - 1);

  const playerVars = {
    autoplay: 0,
    controls: 0,
    rel: 0,
    modestbranding: 1,
    iv_load_policy: 3,
    playsinline: 1,
    // enablejsapi is required for postMessage control
    enablejsapi: 1,
  };
  if (pageOrigin && mode.includeOrigin) {
    // Helps YouTube validate embed source on hosted environments.
    playerVars.origin = pageOrigin;
  }
  if (pageOrigin && mode.includeWidgetReferrer) {
    playerVars.widget_referrer = pageOrigin;
  }

  try {
    if (ytPlayer && typeof ytPlayer.destroy === 'function') ytPlayer.destroy();
  } catch {}

  ytPlayer = new YT.Player('yt-player', {
    height: '100%',
    width: '100%',
    host: mode.host,
    playerVars,
    events: {
      onReady: onYTReady,
      onStateChange: onYTStateChange,
      onError: onYTError,
    }
  });

  if (playerInitTimer) clearTimeout(playerInitTimer);
  playerInitTimer = setTimeout(() => {
    if (ytReady) return;
    if (playerInitModeIndex < modes.length - 1) {
      const nextMode = playerInitModeIndex + 1;
      console.warn('YT player not ready, retrying init mode', nextMode);
      setStatus(`retrying player init (${nextMode + 1}/${modes.length})`);
      createYouTubePlayer(nextMode);
      return;
    }
    playerInitFailed = true;
    pendingPlay = null;
    setStatus('error: player initialization failed');
    toast('Player failed to initialize. Check browser console for details.', 5000);
  }, 4000);
}

function onYTReady() {
  ytReady = true;
  playerInitFailed = false;
  if (playerInitTimer) clearTimeout(playerInitTimer);

  // FIX 3e: After player creates iframe, set referrerpolicy on it
  const iframe = document.querySelector('#yt-player iframe, #player-wrap iframe');
  if (iframe) {
    iframe.setAttribute('referrerpolicy', 'origin');
    iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen');
  }

  startDriftCheck();
  // Apply local volume UI state to the actual player once ready.
  ytPlayer.setVolume(localVolume);
  if (isLocalMuted) ytPlayer.mute();
  // If user clicked Play before ready, start it now.
  if (pendingPlay?.videoId) {
    const { videoId, seek } = pendingPlay;
    pendingPlay = null;
    playVideo(videoId, seek);
  }
  console.log('YT Player ready');
}

// FIX 4: Handle YT errors gracefully with user feedback
function onYTError(e) {
  const code = e.data;
  console.error('YouTube player error:', code);
  const messages = {
    2:   'Invalid video ID',
    5:   'HTML5 player error',
    100: 'Video not found or private',
    101: 'Embed not allowed by owner',
    150: 'Embed not allowed by owner',
  };
  const msg = messages[code] || `Player error (code ${code})`;
  toast(msg, 4000);
  setStatus('error: ' + msg);

  // Error 153 and early init errors are often referrer/origin policy mismatches.
  if ((code === 2 || code === 5 || code === 153) && playerInitModeIndex < 3) {
    const nextMode = playerInitModeIndex + 1;
    toast('Retrying player in compatibility mode…', 2500);
    createYouTubePlayer(nextMode);
    return;
  }

  if (code === 153) {
    playerInitFailed = true;
  }

  // If embed blocked, try next in queue
  if (code === 101 || code === 150) {
    setTimeout(() => playNextInQueue(), 1500);
  }
}

function onYTStateChange(e) {
  const S = YT.PlayerState;
  updateControlsUI();

  if (!isHost) return;
  if (ignoreNext) { ignoreNext = false; return; }

  const now = Date.now();
  if (now - lastSentTs < DEBOUNCE_MS) return;
  lastSentTs = now;

  if (e.data === S.PLAYING || e.data === S.PAUSED || e.data === S.ENDED) {
    const playing = e.data === S.PLAYING;
    broadcastSync({ state: playing ? 'playing' : 'paused' });
    setSyncStatus('live');

    if (e.data === S.ENDED) {
      playNextInQueue();
    }
  }
}

function updateControlsUI() {
  if (!ytPlayer || !ytReady) return;
  try {
    const S = YT.PlayerState;
    const state = ytPlayer.getPlayerState();
    const playing = state === S.PLAYING;

    $('#play-icon').setAttribute('d', playing
      ? 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'
      : 'M8 5v14l11-7z'
    );

    const dur = ytPlayer.getDuration() || 0;
    const pos = ytPlayer.getCurrentTime() || 0;
    if (dur > 0) {
      $('#progress-bar').style.width = (pos/dur*100)+'%';
      $('#time-display').textContent = `${fmtTime(pos)} / ${fmtTime(dur)}`;
    }

    if (viewers[myUserId]) {
      viewers[myUserId].position = pos;
      renderViewers();
    }
  } catch(err) {
    // Player might not be ready yet
  }
}

function playVideo(videoId, seek) {
  if (!ytReady) {
    if (playerInitFailed) {
      playWithFallbackEmbed(videoId, seek || 0);
      toast('Using fallback player mode', 2500);
      return;
    }
    pendingPlay = { videoId, seek: seek || 0 };
    toast(ytApiReady ? 'Player is loading, will start shortly…' : 'YouTube API still loading, please wait…');
    return;
  }
  currentId = videoId;
  $('#idle-screen').classList.add('hidden');
  ignoreNext = true;
  ytPlayer.loadVideoById({ videoId, startSeconds: seek || 0 });
  setStatus(`playing: ${videoId}`);
  renderQueue();
}

function playWithFallbackEmbed(videoId, seek) {
  const mount = $('#yt-player');
  if (!mount) return;
  const start = Math.max(0, Math.floor(seek || 0));
  const src = `https://www.youtube.com/embed/${encodeURIComponent(videoId)}?autoplay=1&playsinline=1&rel=0&modestbranding=1&start=${start}`;
  mount.innerHTML = `<iframe src="${src}" title="YouTube player fallback" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen referrerpolicy="origin" style="width:100%;height:100%;border:0"></iframe>`;
  usingFallbackEmbed = true;
  currentId = videoId;
  $('#idle-screen').classList.add('hidden');
  setStatus(`playing (fallback): ${videoId}`);
  renderQueue();
}

function playNextInQueue() {
  const idx = queue.findIndex(q => q.videoId === currentId);
  if (idx >= 0 && idx < queue.length - 1) {
    const next = queue[idx + 1];
    playVideo(next.videoId);
    if (isHost) broadcastSync({ state: 'playing', videoId: next.videoId, position: 0 });
  } else {
    toast('Queue ended');
  }
}

// ─── Sync ────────────────────────────────────────────────────────────────────
function broadcastSync(extra = {}) {
  if (!widgetApi) return;
  const payload = {
    videoId: currentId,
    position: ytPlayer?.getCurrentTime() || 0,
    state: 'playing',
    ts: Date.now(),
    ...extra,
  };
  widgetApi.sendRoomEvent(EVENT_TYPE, payload).catch((e) => console.warn('sync failed:', e));
}

function applySync(content) {
  const { videoId, position, state, ts } = content || {};
  if (typeof position !== 'number' || isNaN(position) || position < 0 || position > 86400) return;
  if (typeof ts !== 'number' || isNaN(ts)) return;
  if (!['playing', 'paused'].includes(state)) return;
  if (!ytReady) return;
  if (!videoId || typeof videoId !== 'string') return;
  // Validate video ID format
  if (!/^[a-zA-Z0-9_-]{11}$/.test(videoId)) return;

  const adjusted = position + Math.min((Date.now() - ts) / 1000, 5); // cap adjustment at 5s
  const S = YT.PlayerState;

  setSyncStatus('sync');

  if (videoId && videoId !== currentId) {
    playVideo(videoId, adjusted);
    if (state === 'playing') { ignoreNext = true; ytPlayer.playVideo(); }
    setSyncStatus('live');
    return;
  }

  if (!videoId) { setSyncStatus('live'); return; }

  const curPos = ytPlayer.getCurrentTime() || 0;
  const drift = Math.abs(curPos - adjusted);

  if (drift > DRIFT_LIMIT) {
    ignoreNext = true;
    ytPlayer.seekTo(adjusted, true);
  }

  ignoreNext = true;
  if (state === 'playing') ytPlayer.playVideo();
  else ytPlayer.pauseVideo();

  setSyncStatus('live');
}

function startDriftCheck() {
  if (driftTimer) clearInterval(driftTimer);
  driftTimer = setInterval(() => {
    if (!isHost || !ytReady || !currentId) return;
    try {
      const s = ytPlayer.getPlayerState();
      if (s === YT.PlayerState.PLAYING) broadcastSync();
    } catch(e) {}
    updateControlsUI();
  }, POLL_MS);

  setInterval(updateControlsUI, 500);
}

// ─── Matrix Widget API init ──────────────────────────────────────────────────
async function initWidget() {
  try {
    const WidgetApi = matrixWidgetApi.WidgetApi;
    const WidgetApiToWidgetAction = matrixWidgetApi.WidgetApiToWidgetAction;

    const params = new URLSearchParams(location.search);
    const widgetId = params.get('widgetId') || params.get('widget_id') || 'standalone';

    widgetApi = new WidgetApi(widgetId);

    // FIX 5: Only request specific capabilities, not blanket ones
    widgetApi.requestCapabilityToSendEvent(EVENT_TYPE);
    widgetApi.requestCapabilityToReceiveEvent(EVENT_TYPE);
    widgetApi.requestCapabilityToSendEvent(QUEUE_TYPE);
    widgetApi.requestCapabilityToReceiveEvent(QUEUE_TYPE);

    widgetApi.on('ready', async () => {
      try {
        const info = await widgetApi.requestOpenIDConnectToken();
        myUserId = info?.matrix_server_name ? `@unknown:${info.matrix_server_name}` : '@me:local';
      } catch { myUserId = '@me:local'; }
      onReady();
    });

    widgetApi.on(`action:${WidgetApiToWidgetAction.SendEvent}`, (ev) => {
      const { type, content, sender } = ev.detail?.data || {};
      ev.preventDefault();
      widgetApi.transport.reply(ev.detail, {});

      if (type === EVENT_TYPE) {
        if (sender) {
          viewers[sender] = viewers[sender] || {};
          viewers[sender].position = content.position;
          viewers[sender].name = sender.split(':')[0].replace('@','');
          renderViewers();
        }
        if (sender === myUserId) return;
        applySync(content);
      }

      if (type === QUEUE_TYPE && sender !== myUserId) {
        if (content.queue && Array.isArray(content.queue)) {
          queue = content.queue;
          renderQueue();
        }
      }
    });

    widgetApi.start();

    setTimeout(() => {
      if (!myUserId) {
        console.warn('Widget API timeout — running standalone');
        myUserId = '@standalone:local';
        onReady();
      }
    }, 3000);

  } catch (err) {
    console.warn('Widget API unavailable, running standalone:', err);
    myUserId = '@standalone:local';
    widgetApi = null;
    onReady();
  }
}

function onReady() {
  $('#not-ready').classList.add('hidden');

  isHost = true;
  $('#host-badge').style.display = isHost ? '' : 'none';
  setStatus('ready · paste a URL to watch together');

  viewers[myUserId] = { name: myUserId.split(':')[0].replace('@',''), isHost, color: colorFor(myUserId) };
  renderViewers();
  renderQueue(); // FIX 6: Render queue on init so empty state shows

  setSyncStatus(widgetApi ? 'live' : 'waiting');

  if (!widgetApi) {
    toast('Running standalone (no Matrix room connected)');
  }
}

// ─── UI Events ───────────────────────────────────────────────────────────────

// FIX 7: Add to queue — auto-play first item if nothing is playing
$('#url-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const raw = $('#url-input').value;
  const vid = parseYouTubeId(raw);
  if (!vid) {
    $('#url-input').classList.add('error');
    setTimeout(() => $('#url-input').classList.remove('error'), 600);
    toast('Not a valid YouTube URL or video ID');
    return;
  }
  const exists = queue.some(q => q.videoId === vid);
  if (!exists) {
    queue.push({ videoId: vid, title: vid, addedBy: myUserId?.split(':')[0].replace('@','') || 'you' });
    broadcastQueue();
    renderQueue();
    toast('Added to queue');
    fetchTitle(vid);

    // Auto-play if nothing is currently playing
    if (!currentId) {
      playVideo(vid);
      if (isHost) broadcastSync({ state: 'playing', videoId: vid, position: 0 });
    }
  } else {
    toast('Already in queue');
  }
  $('#url-input').value = '';
  activateTab('queue');
});

$('#watch-now-btn').addEventListener('click', () => {
  const raw = $('#url-input').value;
  const vid = parseYouTubeId(raw);
  if (!vid) {
    $('#url-input').classList.add('error');
    setTimeout(() => $('#url-input').classList.remove('error'), 600);
    toast('Not a valid YouTube URL or video ID');
    return;
  }
  $('#url-input').value = '';

  // Also add to queue if not there
  if (!queue.some(q => q.videoId === vid)) {
    queue.push({ videoId: vid, title: vid, addedBy: myUserId?.split(':')[0].replace('@','') || 'you' });
    broadcastQueue();
    fetchTitle(vid);
  }

  playVideo(vid);
  renderQueue();
  if (isHost) broadcastSync({ state: 'playing', videoId: vid, position: 0 });
});

$('#play-pause-btn').addEventListener('click', () => {
  if (!ytPlayer || !ytReady || !currentId) return;
  const S = YT.PlayerState;
  const state = ytPlayer.getPlayerState();
  if (state === S.PLAYING) {
    ytPlayer.pauseVideo();
    if (isHost) broadcastSync({ state: 'paused' });
  } else {
    ytPlayer.playVideo();
    if (isHost) broadcastSync({ state: 'playing' });
  }
});

$('#progress-wrap').addEventListener('click', (e) => {
  if (!ytReady || !currentId) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const frac = (e.clientX - rect.left) / rect.width;
  const dur = ytPlayer.getDuration() || 0;
  const pos = frac * dur;
  ytPlayer.seekTo(pos, true);
  if (isHost) broadcastSync({ state: 'playing', position: pos });
});

$('#fullscreen-btn').addEventListener('click', () => {
  const el = $('#player-area');
  if (document.fullscreenElement) document.exitFullscreen();
  else el.requestFullscreen().catch(()=>{});
});

document.querySelectorAll('.stab').forEach(tab => {
  tab.addEventListener('click', () => activateTab(tab.dataset.tab));
});

function activateTab(name) {
  document.querySelectorAll('.stab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === `tab-${name}`));
}

// ─── Local Volume Controls ───────────────────────────────────────────────────
const muteBtn = document.getElementById('mute-btn');
const volumeSlider = document.getElementById('volume-slider');

let isLocalMuted = false;
let localVolume = 100;

// Helper to update the button icon based on state
function updateVolumeIcon() {
  if (isLocalMuted || localVolume === 0) {
    muteBtn.textContent = '🔇';
  } else if (localVolume < 50) {
    muteBtn.textContent = '🔉';
  } else {
    muteBtn.textContent = '🔊';
  }
}

// Mute Toggle Event
muteBtn.addEventListener('click', () => {
  isLocalMuted = !isLocalMuted;
  
  if (ytPlayer && typeof ytPlayer.mute === 'function') {
    isLocalMuted ? ytPlayer.mute() : ytPlayer.unMute();
    
    // If unmuting and volume is 0, bump it up slightly so they can hear it
    if (!isLocalMuted && localVolume === 0) {
      localVolume = 20;
      volumeSlider.value = localVolume;
      ytPlayer.setVolume(localVolume);
    }
  }
  
  updateVolumeIcon();
});

// Volume Slider Event (Triggers as the user drags)
volumeSlider.addEventListener('input', (e) => {
  localVolume = parseInt(e.target.value, 10);
  
  if (ytPlayer && typeof ytPlayer.setVolume === 'function') {
    ytPlayer.setVolume(localVolume);
    
    // If the user drags volume > 0 while muted, automatically unmute
    if (isLocalMuted && localVolume > 0) {
      isLocalMuted = false;
      ytPlayer.unMute();
    }
    // If user drags volume to 0, functionally mute
    if (!isLocalMuted && localVolume === 0) {
      isLocalMuted = true;
      ytPlayer.mute();
    }
  }
  
  updateVolumeIcon();
});

// ─── Title fetch ─────────────────────────────────────────────────────────────
async function fetchTitle(videoId) {
  // FIX 8: Use noembed.com first (more CORS-friendly), then YouTube oEmbed
  const urls = [
    `https://noembed.com/embed?url=https://youtube.com/watch?v=${encodeURIComponent(videoId)}`,
    `https://www.youtube.com/oembed?url=https://youtube.com/watch?v=${encodeURIComponent(videoId)}&format=json`,
  ];
  for (const url of urls) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const data = await res.json();
      if (data.title) {
        const item = queue.find(q => q.videoId === videoId);
        if (item) {
          item.title = data.title;
          renderQueue();
          broadcastQueue();
        }
        return;
      }
    } catch { continue; }
  }
}

// ─── Boot ────────────────────────────────────────────────────────────────────
initWidget();

setTimeout(() => {
  if (window.__ytApiScriptFailed) {
    toast('Could not load YouTube API script', 5000);
    setStatus('error: YouTube API script failed to load');
    return;
  }
  if (!ytApiReady) {
    toast('YouTube API did not load. If testing locally, use http://localhost (not file://).', 5000);
    setStatus('error: YouTube API failed to load');
  }
}, 7000);

window.addEventListener('error', (ev) => {
  if (!ev?.message) return;
  console.error('Unhandled error:', ev.message, ev.error);
  if (!ytReady) setStatus('error: ' + ev.message);
});

window.addEventListener('unhandledrejection', (ev) => {
  const msg = ev?.reason?.message || String(ev?.reason || 'promise rejection');
  console.error('Unhandled rejection:', ev.reason);
  if (!ytReady) setStatus('error: ' + msg);
});
